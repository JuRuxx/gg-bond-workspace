<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加班管理局 - 小说阅读器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #0a0a0f;
    color: #c8c8d0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== 顶部导航 ===== */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    background: #12121a;
    border-bottom: 1px solid #2a2a3a;
    padding: 12px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .top-bar .novel-title {
    font-size: 18px; font-weight: 700;
    color: #e0b846;
    letter-spacing: 1px;
  }
  .top-bar .back-home {
    font-size: 13px;
    color: #888;
    text-decoration: none;
    padding: 4px 12px;
    border: 1px solid #333;
    border-radius: 6px;
    transition: .2s;
    white-space: nowrap;
  }
  .top-bar .back-home:hover { color: #e0b846; border-color: #e0b846; }
  .top-bar .chapter-toggle {
    display: none;
    margin-left: auto;
    background: none; border: 1px solid #333;
    color: #c8c8d0; font-size: 13px;
    padding: 4px 12px; border-radius: 6px;
    cursor: pointer;
  }
  .top-bar .chapter-toggle:hover { border-color: #e0b846; color: #e0b846; }
  .top-bar .current-chapter-name {
    margin-left: auto;
    font-size: 14px; color: #999;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 260px;
  }

  /* ===== 布局骨架 ===== */
  .layout { display: flex; margin-top: 52px; min-height: calc(100vh - 52px); }

  /* ===== 侧边栏（章节目录） ===== */
  .sidebar {
    width: 240px; flex-shrink: 0;
    background: #0e0e18;
    border-right: 1px solid #1e1e2e;
    overflow-y: auto;
    padding: 16px 0;
    position: fixed; top: 52px; bottom: 60px;
    transition: transform .3s ease;
  }
  .sidebar h2 {
    font-size: 14px; color: #666;
    padding: 0 18px 12px;
    font-weight: 600;
    letter-spacing: 2px;
  }
  .sidebar .chapter-item {
    display: block;
    padding: 10px 18px;
    font-size: 14px; line-height: 1.4;
    color: #888;
    text-decoration: none;
    cursor: pointer;
    transition: .2s;
    border-left: 3px solid transparent;
  }
  .sidebar .chapter-item:hover { background: #16162a; color: #ddd; }
  .sidebar .chapter-item.active {
    background: #1a1a30;
    color: #e0b846;
    border-left-color: #e0b846;
  }

  /* ===== 正文区域 ===== */
  .content {
    flex: 1;
    margin-left: 240px;
    padding: 40px 48px 80px;
    max-width: 900px;
    line-height: 1.9;
    font-size: 17px;
    color: #d0d0da;
  }
  .content h3 {
    font-size: 22px;
    color: #e8c85a;
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: 4px;
  }
  .content p {
    text-indent: 2em;
    margin-bottom: 1.2em;
  }
  .content p:first-of-type { margin-top: 0; }
  .content .loading-indicator {
    text-align: center; padding: 80px 0; color: #666; font-size: 15px;
  }
  .content .error-indicator {
    text-align: center; padding: 80px 0; color: #c55; font-size: 15px;
  }

  /* ===== 底部导航 ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 100;
    margin-left: 240px;
    background: #12121a;
    border-top: 1px solid #2a2a3a;
    padding: 10px 48px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .bottom-nav button {
    background: #1e1e30;
    border: 1px solid #333;
    color: #c8c8d0;
    padding: 8px 24px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: .2s;
  }
  .bottom-nav button:hover:not(:disabled) {
    background: #2a2a44;
    border-color: #e0b846;
    color: #e0b846;
  }
  .bottom-nav button:disabled {
    opacity: .35;
    cursor: not-allowed;
  }
  .bottom-nav .chapter-progress {
    font-size: 13px; color: #666;
  }

  /* ===== 移动端适配 ===== */
  @media (max-width: 768px) {
    .top-bar .chapter-toggle { display: block; }
    .top-bar .current-chapter-name { max-width: 140px; }
    .sidebar {
      transform: translateX(-100%);
      width: 260px;
      z-index: 99;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 98;
    }
    .sidebar-overlay.open { display: block; }
    .content {
      margin-left: 0;
      padding: 24px 20px 80px;
      font-size: 16px;
    }
    .bottom-nav {
      margin-left: 0;
      padding: 10px 16px;
    }
    .bottom-nav button { padding: 8px 16px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- ===== 顶部导航 ===== -->
<div class="top-bar">
  <span class="novel-title">📖 加班管理局</span>
  <a href="/" class="back-home">← 首页</a>
  <button class="chapter-toggle" id="chapterToggle">目录 ☰</button>
  <span class="current-chapter-name" id="currentChapterName">第01章</span>
</div>

<!-- ===== 移动端遮罩 ===== -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">

  <!-- ===== 侧边栏 ===== -->
  <nav class="sidebar" id="sidebar">
    <h2>目 录</h2>
    <div id="chapterList"></div>
  </nav>

  <!-- ===== 正文 ===== -->
  <main class="content" id="content">
    <div class="loading-indicator">加载中...</div>
  </main>

</div>

<!-- ===== 底部导航 ===== -->
<div class="bottom-nav">
  <button id="prevBtn">← 上一章</button>
  <span class="chapter-progress" id="progressText">1 / 15</span>
  <button id="nextBtn">下一章 →</button>
</div>

<script>
(function() {
  // ===== 章节配置 =====
  var chapters = [
    { id: "01", file: "第01章-第17次面试.html", name: "第01章 第17次面试" },
    { id: "02", file: "第02章-欢迎来到加班管理局.html", name: "第02章 欢迎来到加班管理局" },
    { id: "03", file: "第03章-第一个案件.html", name: "第03章 第一个案件" },
    { id: "04", file: "第04章-姚师傅的时间折叠.html", name: "第04章 姚师傅的时间折叠" },
    { id: "05", file: "第05章-旧驻地的秘密.html", name: "第05章 旧驻地的秘密" },
    { id: "06", file: "第06章-不要相信管理局.html", name: "第06章 不要相信管理局" },
    { id: "07", file: "第07章-林深的线人.html", name: "第07章 林深的线人" },
    { id: "08", file: "第08章-苏棠的过去.html", name: "第08章 苏棠的过去" },
    { id: "09", file: "第09章-春茧路七号.html", name: "第09章 春茧路七号" },
    { id: "10", file: "第10章-出口在你身上.html", name: "第10章 出口在你身上" },
    { id: "11", file: "第11章-地下三十八米.html", name: "第11章 地下三十八米" },
    { id: "12", file: "第12章-管理局的围剿.html", name: "第12章 管理局的围剿" },
    { id: "13", file: "第13章-钥匙的代价.html", name: "第13章 钥匙的代价" },
    { id: "14", file: "第14章-局长的棋.html", name: "第14章 局长的棋" },
    { id: "15", file: "第15章-加班结束了.html", name: "第15章 加班结束了" }
  ];

  // ===== DOM 引用 =====
  var contentEl = document.getElementById("content");
  var chapterListEl = document.getElementById("chapterList");
  var prevBtn = document.getElementById("prevBtn");
  var nextBtn = document.getElementById("nextBtn");
  var progressText = document.getElementById("progressText");
  var currentChapterName = document.getElementById("currentChapterName");
  var sidebar = document.getElementById("sidebar");
  var sidebarOverlay = document.getElementById("sidebarOverlay");
  var chapterToggle = document.getElementById("chapterToggle");

  // ===== 状态 =====
  var currentIndex = 0;
  var isLoading = false;

  // ===== 渲染侧边栏 =====
  function renderSidebar() {
    var html = "";
    for (var i = 0; i < chapters.length; i++) {
      var ch = chapters[i];
      var activeClass = (i === currentIndex) ? ' active' : '';
      html += '<a class="chapter-item' + activeClass + '" data-index="' + i + '">' + ch.name + '</a>';
    }
    chapterListEl.innerHTML = html;
  }

  // ===== 加载章节 =====
  function loadChapter(index) {
    if (isLoading) return;
    if (index < 0 || index >= chapters.length) return;

    isLoading = true;
    currentIndex = index;

    // 更新 UI 状态
    updateUI();

    var ch = chapters[index];
    contentEl.innerHTML = '<div class="loading-indicator">加载中...</div>';

    fetch(ch.file)
      .then(function(res) {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then(function(html) {
        contentEl.innerHTML = html;
        isLoading = false;
      })
      .catch(function(err) {
        contentEl.innerHTML = '<div class="error-indicator">加载失败：' + err.message + '</div>';
        isLoading = false;
      });
  }

  // ===== 更新 UI（导航状态、侧边栏高亮、进度） =====
  function updateUI() {
    // 按钮
    prevBtn.disabled = (currentIndex === 0);
    nextBtn.disabled = (currentIndex === chapters.length - 1);

    // 进度
    progressText.textContent = (currentIndex + 1) + " / " + chapters.length;

    // 当前章节名
    currentChapterName.textContent = chapters[currentIndex].name;

    // 侧边栏高亮
    renderSidebar();

    // 滚动到顶部
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ===== 切换目录侧栏（手机） =====
  function toggleSidebar() {
    sidebar.classList.toggle("open");
    sidebarOverlay.classList.toggle("open");
  }
  function closeSidebar() {
    sidebar.classList.remove("open");
    sidebarOverlay.classList.remove("open");
  }

  // ===== 事件绑定 =====

  // 侧边栏点击切换章节
  chapterListEl.addEventListener("click", function(e) {
    var target = e.target.closest(".chapter-item");
    if (!target) return;
    var idx = parseInt(target.getAttribute("data-index"), 10);
    if (idx === currentIndex) { closeSidebar(); return; }
    loadChapter(idx);
    closeSidebar();
  });

  // 顶栏目录按钮
  chapterToggle.addEventListener("click", toggleSidebar);

  // 遮罩关闭
  sidebarOverlay.addEventListener("click", closeSidebar);

  // 上一章
  prevBtn.addEventListener("click", function() {
    if (currentIndex > 0) loadChapter(currentIndex - 1);
  });

  // 下一章
  nextBtn.addEventListener("click", function() {
    if (currentIndex < chapters.length - 1) loadChapter(currentIndex + 1);
  });

  // 键盘快捷键
  document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowLeft" && currentIndex > 0) loadChapter(currentIndex - 1);
    if (e.key === "ArrowRight" && currentIndex < chapters.length - 1) loadChapter(currentIndex + 1);
    if (e.key === "Escape") closeSidebar();
  });

  // ===== 启动！默认加载第一章 =====
  loadChapter(0);

})();
</script>
</body>
</html>
