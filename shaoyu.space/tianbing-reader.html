<!-- ===== 顶部导航 ===== -->
<header class="topbar">

  <button class="chapter-item" data-chapter="3"><span class="chapter-num">04</span> 风险与建议</button>
  <button class="chapter-item" data-chapter="4"><span class="chapter-num">05</span> 总结</button>

  <button class="chapter-item" data-chapter="6"><span class="chapter-num">06</span> 发动机技术路线</button>

<!-- ===== 主内容 ===== -->
<main class="main" id="main">
  <div class="content-wrap" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">加载报告中……</div>
    </div>
  </div>

<script>
/* ===========================================================
   Markdown → HTML 简易渲染器
   支持：h1-h4、粗体、引用、列表(ul/ol)、代码、表格、水平线、链接
   =========================================================== */
function renderMarkdown(md) {
  if (!md) return '';
  let html = md;

  // 先处理代码块（保护它们）
  const codeBlocks = [];
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code class="language-${lang}">${escapeHtml(code.trim())}</code></pre>`);
    return `%%CODEBLOCK_${idx}%%`;
  });

  // 处理行内代码（在换行之前处理）
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // 处理链接 [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // 处理图片 ![alt](url)（简单处理）
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:16px 0;">');

  // 水平线
  html = html.replace(/^---+/gm, '<hr>');

  // 引用块 > text
  html = html.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
  // 合并相邻引用块
  html = html.replace(/<\/blockquote>\s*<blockquote>/g, '\n');
  html = html.replace(/<blockquote>\s*<p>([\s\S]*?)<\/p>\s*<\/blockquote>/g, (m, content) => {
    const lines = content.split(/\n/).filter(l => l.trim());
    return `<blockquote>${lines.map(l => `<p>${l}</p>`).join('')}</blockquote>`;
  });

  // 表格（必须在其他行处理前）
  html = html.replace(/^(\|.+\|)\n(\|[-:| ]+\|)\n((?:\|.+\|\n?)*)/gm, (match) => {
    const lines = match.trim().split('\n');
    if (lines.length < 3) return match;
    const headerCells = splitTableRow(lines[0]);
    const bodyRows = lines.slice(2).filter(l => l.trim());
    let thead = `<thead><tr>${headerCells.map(c => `<th>${c}</th>`).join('')}</tr></thead>`;
    let tbody = `<tbody>${bodyRows.map(row => {
      const cells = splitTableRow(row);
      return `<tr>${cells.map(c => `<td>${c}</td>`).join('')}</tr>`;
    }).join('')}</tbody>`;
    return `<div class="table-wrap"><table>${thead}${tbody}</table></div>`;
  });

  // h1 (# 标题)
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // h2 (## 标题)
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  // h3 (### 标题)
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  // h4 (#### 标题)
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');

  // 无序列表
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/g, (m) => {
    // 合并连续的li
    return m;
  });
  // 包裹ul
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // 有序列表
  html = html.replace(/^\d+\.\s(.+)$/gm, '<oli>$1</oli>');
  html = html.replace(/((?:<oli>.*<\/oli>\n?)+)/g, (m) => {
    return '<ol>' + m.replace(/<oli>/g, '<li>').replace(/<\/oli>/g, '</li>') + '</ol>';
  });

  // 粗体
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // 段落（没有被标签包围的文本块）
  html = html.replace(/^(?!<[hulopbdi\/]|$)(.+)$/gm, '<p>$1</p>');

  // 合并连续的p
  // 不合并，保留自然段落

  // 恢复代码块
  html = html.replace(/%%CODEBLOCK_(\d+)%%/g, (m, idx) => codeBlocks[parseInt(idx)]);

  // 清理
  html = html.replace(/\n{3,}/g, '\n\n');

  return html;
}

function splitTableRow(row) {
  return row.split('|').filter((c,i,a) => i > 0 && i < a.length - 1).map(c => c.trim());
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ===========================================================
   章节数据
   =========================================================== */
const CHAPTER_MARKERS = [
  '## 第一部分：赛道分析',
  '## 第二部分：天兵科技基本面分析',
  '## 第三部分：竞品对比分析',
  '## 第四部分：风险提示与投资建议',
  '## 第五部分：总结',

  '## 第6章（附章）火箭发动机技术路线深度分析'
];

const CHAPTER_TITLES = [
  '第一部分：赛道分析——商业航天发射服务',
  '第二部分：天兵科技基本面分析',
  '第三部分：竞品对比分析',
  '第四部分：风险提示与投资建议',
  '第五部分：总结',
  '第6章（附章）火箭发动机技术路线深度分析'
];

// 标题行（# 天兵科技投资分析报告）
const REPORT_TITLE_MD = '# 天兵科技投资分析报告\n\n> **密级**：内部资料 · 注意保密\n> **编制**：猪猪侠团队\n> **日期**：2026-05-21\n\n---\n\n';

/* ===========================================================
   DOM 引用
   =========================================================== */
const contentEl = document.getElementById('content');
const sidebarEl = document.getElementById('sidebar');
const overlayEl = document.getElementById('overlay');
const menuBtn = document.getElementById('menuBtn');
const chapterItems = document.querySelectorAll('.chapter-item');
const mainEl = document.getElementById('main');

let rawMarkdown = '';
let chapters = [];
let currentChapter = 0;
let isLoading = true;

/* ===========================================================
   加载 & 分割 Markdown
   =========================================================== */
async function loadReport() {
  try {
    const resp = await fetch('tianbing-report.md');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    rawMarkdown = await resp.text();
    splitChapters(rawMarkdown);
    isLoading = false;
    renderChapter(0);
  } catch (err) {
    contentEl.innerHTML = `
      <div style="text-align:center;padding:80px 24px">
        <div style="font-size:48px;margin-bottom:20px">😱</div>
        <h2 style="color:#ff6b6b;margin-bottom:12px">加载失败</h2>
        <p style="color:#888;margin-bottom:8px">无法读取报告文件 <code>tianbing-report.md</code></p>
        <p style="color:#666;font-size:14px">${err.message}</p>
        <button onclick="location.reload()" style="
          margin-top:24px;padding:10px 28px;border-radius:8px;
          border:1px solid rgba(0,212,170,0.3);color:#00d4aa;
          background:transparent;font-size:14px;font-weight:600;
          cursor:pointer;font-family:inherit;">重新加载</button>
      </div>`;
  }
}

function splitChapters(md) {
  chapters = [];
  // 找所有 ## 章节标记的位置
  let lastIdx = 0;
  for (let i = 0; i < CHAPTER_MARKERS.length; i++) {
    const marker = CHAPTER_MARKERS[i];
    const start = md.indexOf('\n' + marker) !== -1 ? md.indexOf('\n' + marker) + 1 : md.indexOf(marker);
    if (start === -1) {
      chapters.push('*章节内容未找到*');
      continue;
    }
    let end = md.length;
    if (i < CHAPTER_MARKERS.length - 1) {
      const nextMarker = CHAPTER_MARKERS[i + 1];
      const nextIdx = md.indexOf('\n' + nextMarker);
      if (nextIdx !== -1) {
        end = nextIdx + 1;
      } else {
        const nextIdx2 = md.indexOf(nextMarker);
        if (nextIdx2 > start) end = nextIdx2;
      }
    }
    const chapContent = md.substring(start, end).trim();
    chapters.push(chapContent);
  }
}

/* ===========================================================
   渲染章节
   =========================================================== */
function renderChapter(idx) {
  if (isLoading) return;
  if (idx < 0 || idx >= chapters.length) return;
  currentChapter = idx;

  // 更新侧栏高亮
  chapterItems.forEach((item, i) => {
    item.classList.toggle('active', i === idx);
  });

  // 构建完整markdown：标题 + 当前章节内容
  let mdContent = REPORT_TITLE_MD + chapters[idx];
  let html = renderMarkdown(mdContent);

  // 底部导航
  const prevDisabled = idx === 0 ? 'disabled' : '';
  const nextDisabled = idx === chapters.length - 1 ? 'disabled' : '';
  const progressHTML = `
    <div class="bottom-nav">
      <button class="btn-chapter" id="prevBtn" ${prevDisabled}>
        ← 上一章
      </button>
      <div class="chapter-progress">
        <span>${idx + 1}</span> / ${chapters.length}
      </div>
      <button class="btn-chapter" id="nextBtn" ${nextDisabled}>
        下一章 →
      </button>
    </div>
  `;

  contentEl.innerHTML = `<div class="content">${html}</div>${progressHTML}`;

  // 绑定底部按钮
  document.getElementById('prevBtn')?.addEventListener('click', () => goChapter(idx - 1));
  document.getElementById('nextBtn')?.addEventListener('click', () => goChapter(idx + 1));

  // 滚动到顶部
  mainEl.scrollTop = 0;
  window.scrollTo(0, 0);
}

function goChapter(idx) {
  if (idx < 0 || idx >= chapters.length) return;
  renderChapter(idx);
  closeSidebar();
}

/* ===========================================================
   侧边栏
   =========================================================== */
function toggleSidebar() {
  sidebarEl.classList.toggle('open');
  overlayEl.classList.toggle('show');
}

function closeSidebar() {
  sidebarEl.classList.remove('open');
  overlayEl.classList.remove('show');
}

menuBtn.addEventListener('click', toggleSidebar);
overlayEl.addEventListener('click', closeSidebar);

/* ===========================================================
   事件绑定
   =========================================================== */
chapterItems.forEach((item, idx) => {
  item.addEventListener('click', () => {
    if (idx !== currentChapter) {
      goChapter(idx);
    } else {
      closeSidebar();
    }
  });
});

// 键盘快捷键
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    if (currentChapter > 0) goChapter(currentChapter - 1);
  } else if (e.key === 'ArrowRight') {
    if (currentChapter < chapters.length - 1) goChapter(currentChapter + 1);
  }
});

/* ===========================================================
   启动
   =========================================================== */
loadReport();
</script>

</body>
</html>
